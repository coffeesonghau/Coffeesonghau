<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sông Hậu Coffee - Sales Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="data.js"></script>
</head>

<body>
    <div class="app-container">
        <header>
            <div class="header-top">
                <div class="menu-btn" onclick="toggleMenu()">
                    <i class="fas fa-bars"></i>
                </div>
                <div style="font-size: 0.85rem; font-weight: bold;">
                    <i class="fas fa-user"></i> <span id="currentUserName">Đang tải...</span>
                </div>
            </div>
            <div class="logo">SÔNG HẬU COFFEE</div>
        </header>

        <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
        <div class="side-menu" id="sideMenu">
            <div class="user-profile-section">
                <div class="avatar-container" onclick="document.getElementById('avatarUpload').click()">
                    <img id="userAvatar" src="https://ui-avatars.com/api/?name=NV&background=4e54c8&color=fff&size=100" alt="Avatar">
                    <div class="avatar-overlay"><i class="fas fa-camera"></i></div>
                </div>
                <input type="file" id="avatarUpload" accept="image/*" style="display: none;">
                <div class="user-info">
                    <div class="user-name" id="menuUserName">Đang tải...</div>
                    <div class="user-role"><i class="fas fa-briefcase"></i> Nhân viên Sales</div>
                </div>
            </div>
            <div class="side-menu-header">MENU CÔNG VIỆC</div>
            <a href="index.html"><i class="fas fa-plus-circle"></i> Tạo Khách & Lên Đơn</a>
            <a href="donhang.html"><i class="fas fa-box-open"></i> Lịch Sử Đơn Hàng</a>
            
            <a href="#" onclick="app.logout()"><i class="fas fa-sign-out-alt"></i> Đăng Xuất</a>
        </div>

        <div class="progress-container">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <form id="saleForm">
            <section class="form-step active" id="step1">
                <h3><i class="fas fa-calculator"></i> Báo Giá & Lên Đơn</h3>
                
                <div class="input-group" style="margin-bottom: 15px;">
                    <label>Kênh giá áp dụng</label>
                    <select id="channel-select" name="kenh_ban">
                        <option value="ban_le">Bán lẻ</option>
                        <option value="dai_ly_quan">Đại Lý / Quán</option>
                        <option value="he_thong_npp">Hệ Thống / NPP</option>
                    </select>
                </div>

                <div class="search-product-box">
                    <input type="text" id="search-product" placeholder="🔍 Tìm tên, trọng lượng..." oninput="filterProducts()">
                    <div class="quick-filters">
                        <button type="button" class="tag-btn cart-tag" onclick="showSelectedOnly()">🛒 Đã chọn</button>
                        <button type="button" class="tag-btn" onclick="setFilter('500g')">500g</button>
                        <button type="button" class="tag-btn" onclick="setFilter('250g')">250g</button>
                        <button type="button" class="tag-btn" onclick="setFilter('100g')">100g</button>
                        <button type="button" class="tag-btn" onclick="setFilter('')">Tất cả</button>
                    </div>
                </div>

                <div class="product-list" id="product-list" style="margin-top: 10px;">
                    </div>

                <div class="total-box" style="margin-bottom: 15px;">
                    Tổng cộng: <span id="total-price">0 đ</span>
                </div>
                
                <input type="hidden" name="chi_tiet_don" id="chi_tiet_don" value="">

                <button type="button" class="btn-prev" onclick="app.copyBaoGia()" style="background: #e8f4fd; color: #3498db; width: 100%; margin-bottom: 15px; border: 1px dashed #3498db;">
                    <i class="fas fa-copy"></i> Copy Báo Giá Nhanh (Gửi Zalo)
                </button>

                <div class="actions">
                    <button type="button" class="btn-prev" onclick="app.clearDraft()" style="background: #ffeaa7; color: #d63031;">
                        <i class="fas fa-trash-alt"></i> Xóa Giỏ
                    </button>
                    <button type="button" class="btn-next" onclick="app.validateAndNext(1, 2)">Tiếp theo (Thông tin) <i class="fas fa-chevron-right"></i></button>
                </div>
            </section>

            <section class="form-step" id="step2">
                <h3><i class="fas fa-id-card"></i> Thông Tin Khách Hàng</h3>
                <div class="input-group">
                    <label>Tên cửa hàng *</label>
                    <input type="text" name="ten_quan" placeholder="Nhập tên quán..." required oninput="app.capitalizeFirstLetter(this)">
                </div>
                <div class="input-group">
                    <label>Địa chỉ *</label>
                    <div class="gps-wrapper">
                        <input type="text" name="dia_chi" id="dia_chi" placeholder="Số nhà, tên đường..." required>
                        <button type="button" class="btn-gps" onclick="app.getLocation()"><i class="fas fa-location-arrow"></i></button>
                    </div>
                </div>
                <div class="grid">
                    <div class="input-group">
                        <label>Chủ quán/Người mua *</label>
                        <input type="text" name="chu_quan" required placeholder="Tên khách hàng">
                    </div>
                    <div class="input-group">
                        <label>SĐT/Zalo *</label>
                        <input type="tel" name="sdt_zalo" required pattern="[0-9]{10}" placeholder="09xxxxxxxx" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10);">
                    </div>
                </div>
                <div class="actions">
                    <button type="button" class="btn-prev" onclick="app.nextStep(1)">Quay lại Sửa đơn</button>
                    <button type="button" class="btn-next" onclick="app.validateAndNext(2, 3)">Khảo sát nhu cầu <i class="fas fa-chevron-right"></i></button>
                </div>
            </section>

            <section class="form-step" id="step3">
                <h3><i class="fas fa-eye"></i> Nhu Cầu & Khảo Sát</h3>
                <div class="grid">
                    <div class="input-group">
                        <label>Cách pha *</label>
                        <select name="loai_ban" required>
                            <option value="">-- Chọn cách pha --</option>
                            <option value="Pha máy">Pha máy</option>
                            <option value="Pha phin">Pha phin</option>
                            <option value="Cả hai">Cả hai</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Sản lượng/tháng (kg) *</label>
                        <input type="number" name="luong_dung" required placeholder="VD: 5">
                    </div>
                </div>

                <div class="grid">
                    <div class="input-group">
                        <label>Hãng đang dùng </label>
                        <input type="text" name="hang_dang_dung" placeholder="Tên hãng...">
                    </div>
                    <div class="input-group">
                        <label>Gu hiện tại</label>
                        <input type="text" name="gu_hien_tai" placeholder="Đậm, đắng...">
                    </div>
                </div>

                <div class="grid">
                    <div class="input-group">
                        <label>Tiềm năng *</label>
                        <select name="tiem_nang" required>
                            <option value="">-- Đánh giá --</option>
                            <option value="1">⭐ Nhỏ</option>
                            <option value="2">⭐⭐ Ổn định</option>
                            <option value="3">⭐⭐⭐ Lớn</option>
                            <option value="4">⭐⭐⭐⭐ Rất lớn</option>
                            <option value="5">⭐⭐⭐⭐⭐ VIP</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Tình trạng mẫu *</label>
                        <select name="da_gui_mau" required>
                            <option value="">-- Chọn --</option>
                            <option value="Chưa gửi">Chưa gửi</option>
                            <option value="Đã gửi dùng thử">Đã gửi thử</option>
                            <option value="Đã test tại quán">Đã test tại quán</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label>Ngày ghé lại / Hẹn *</label>
                    <input type="date" name="ngay_goi_lai" id="ngay_goi_lai" required>
                </div>
                <div class="input-group">
                    <label>Ghi chú quan trọng</label>
                    <textarea name="phan_hoi" rows="2" placeholder="Ghi chú thêm về khách..."></textarea>
                </div>
                <div class="actions">
                    <button type="button" class="btn-prev" onclick="app.nextStep(2)">Quay lại</button>
                    <button type="submit" class="btn-submit" id="submitBtn">HOÀN TẤT & LƯU</button>
                </div>
            </section>
        </form>
    </div>
    <script src="script.js"></script>
</body>

</html>
