<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sông Hậu Coffee - Sales Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="data.js"></script>
    <style>
        /* CSS Tối ưu giao diện POS chuyên nghiệp cho Sales */
        .sales-header-card {
            background: linear-gradient(135deg, #ffffff, #f8fafc);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
        }

        .search-icon-wrapper {
            position: relative;
            margin-top: 10px;
        }

        .search-icon-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
        }

        .search-icon-wrapper input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            border-radius: 25px;
            border: 1px solid #cbd5e1;
            font-size: 0.95rem;
            outline: none;
            box-sizing: border-box;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
            transition: 0.2s;
        }

        .search-icon-wrapper input:focus {
            border-color: var(--primary-color, #4e54c8);
        }

        .quick-filters {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 12px 0 5px 0;
        }

        .quick-filters::-webkit-scrollbar {
            display: none;
        }

        .quick-filters .tag-btn {
            white-space: nowrap;
            padding: 6px 15px;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            background: #fff;
            color: #475569;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .quick-filters .tag-btn:active {
            transform: scale(0.95);
        }

        .quick-filters .cart-tag {
            border-color: #10b981;
            color: #10b981;
            background: #ecfdf5;
        }

        .sticky-total-bar {
            background: #fff;
            border: 1px solid #e2e8f0;
            padding: 12px 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
            margin: 15px 0;
            border-left: 4px solid #e74c3c;
        }

        .total-label {
            font-size: 0.85rem;
            color: #64748b;
            font-weight: 700;
            text-transform: uppercase;
        }

        .total-amount {
            font-size: 1.3rem;
            font-weight: bold;
            color: #e74c3c;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <div class="header-top">
                <div class="menu-btn" onclick="toggleMenu()">
                    <i class="fas fa-bars"></i>
                </div>
                <div style="font-size: 0.85rem; font-weight: bold;">
                    <i class="fas fa-user"></i> <span id="currentUserName">Đang tải...</span>
                </div>
            </div>
            <div class="logo">SÔNG HẬU COFFEE</div>
        </header>

        <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
        <div class="side-menu" id="sideMenu">
            <div class="user-profile-section">
                <div class="avatar-container" onclick="document.getElementById('avatarUpload').click()">
                    <img id="userAvatar" src="https://ui-avatars.com/api/?name=NV&background=4e54c8&color=fff&size=100"
                        alt="Avatar">
                    <div class="avatar-overlay"><i class="fas fa-camera"></i></div>
                </div>
                <input type="file" id="avatarUpload" accept="image/*" style="display: none;">
                <div class="user-info">
                    <div class="user-name" id="menuUserName">Đang tải...</div>
                    <div class="user-role"><i class="fas fa-briefcase"></i> Nhân viên Sales</div>
                </div>
            </div>
            <div class="side-menu-header">MENU CÔNG VIỆC</div>
            <a href="donhang.html"><i class="fas fa-box-open"></i> Lịch Sử Đơn Hàng</a>
            <a href="#" onclick="openDeleteModal()"><i class="fas fa-trash-alt"></i> Yêu cầu Xoá Đơn</a>
            <a href="#" onclick="app.logout()"><i class="fas fa-sign-out-alt"></i> Đăng Xuất</a>
        </div>

        <div class="actions top-action-bar">
            <button type="button" class="btn-refresh" onclick="app.clearDraft()">
                <i class="fas fa-redo-alt"></i> Mới
            </button>
            <button type="button" class="btn-copy" onclick="app.copyBaoGia()">
                <i class="fas fa-copy"></i> Copy
            </button>
            <button type="button" class="btn-next" onclick="app.validateAndNext(1, 2)">
                Tiếp <i class="fas fa-arrow-right"></i>
            </button>
        </div>

        <div id="deleteModal" class="modal-overlay" style="display:none;">
            <div class="modal-content">
                <h3><i class="fas fa-trash-alt" style="color:#e74c3c;"></i> Yêu cầu Xoá Đơn</h3>
                <p style="font-size: 0.85rem; color: #64748b; margin-bottom: 15px;">Gửi yêu cầu về bộ phận IT để hủy/xóa
                    đơn hàng trên hệ thống.</p>

                <div class="input-group">
                    <label>Mã đơn hàng cần xóa *</label>
                    <input type="text" id="delOrderId" placeholder="VD: DH123456789" required>
                </div>
                <div class="input-group">
                    <label>Lý do xóa / Hủy *</label>
                    <textarea id="delReason" rows="2" placeholder="VD: Khách đổi ý, đặt trùng đơn..."
                        required></textarea>
                </div>

                <div class="actions" style="margin-top: 20px;">
                    <button class="btn-prev" onclick="closeDeleteModal()">Hủy</button>
                    <button class="btn-submit" onclick="submitDeleteRequest()" style="background: #e74c3c;"><i
                            class="fas fa-paper-plane"></i> Gửi IT</button>
                </div>
            </div>
        </div>

        <form id="saleForm">
            <section class="form-step active" id="step1">
                <h3><i class="fas fa-calculator"></i> Báo Giá & Lên Đơn</h3>

                <div class="sales-header-card">
                    <div class="input-group" style="margin-bottom: 0;">
                        <label style="font-size: 0.8rem; color: #475569;"><i class="fas fa-tags"></i> Kênh giá áp
                            dụng</label>
                        <select id="channel-select" name="kenh_ban"
                            style="padding: 10px; border-radius: 8px; font-weight: bold; color: #2c3e50;">
                            <option value="ban_le">Bán lẻ</option>
                            <option value="dai_ly_quan">Đại Lý / Quán</option>
                            <option value="he_thong_npp">Hệ Thống / NPP</option>
                        </select>
                    </div>

                    <div class="search-icon-wrapper">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search-product" placeholder="Tìm tên món, trọng lượng..."
                            oninput="filterProducts()">
                    </div>

                    <div class="quick-filters">
                        <button type="button" class="tag-btn cart-tag" onclick="showSelectedOnly()"><i
                                class="fas fa-shopping-cart"></i> Đang chọn</button>
                        <button type="button" class="tag-btn" onclick="setFilter('500g')">500g</button>
                        <button type="button" class="tag-btn" onclick="setFilter('250g')">250g</button>
                        <button type="button" class="tag-btn" onclick="setFilter('100g')">100g</button>
                        <button type="button" class="tag-btn" onclick="setFilter('')">Tất cả</button>
                    </div>
                </div>

                <div class="product-list" id="product-list">
                </div>

                <div class="sticky-total-bar">
                    <span class="total-label">Tổng thanh toán:</span>
                    <span class="total-amount" id="total-price">0 đ</span>
                </div>

                <input type="hidden" name="chi_tiet_don" id="chi_tiet_don" value="">

                <div class="actions">
                    <button type="button" class="btn-refresh" onclick="app.clearDraft()">
                        <i class="fas fa-redo-alt"></i> Làm Mới
                    </button>
                    <button type="button" class="btn-next" onclick="app.validateAndNext(1, 2)">
                        Tiếp theo <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </section>

            <section class="form-step" id="step2">
                <h3><i class="fas fa-id-card"></i> Thông Tin Khách Hàng</h3>
                <div class="input-group">
                    <label>Tên cửa hàng *</label>
                    <input type="text" name="ten_quan" placeholder="Nhập tên quán..." required
                        oninput="app.capitalizeFirstLetter(this)">
                </div>
                <div class="input-group">
                    <label>Địa chỉ *</label>
                    <div class="gps-wrapper">
                        <input type="text" name="dia_chi" id="dia_chi" placeholder="Số nhà, tên đường..." required>
                        <button type="button" class="btn-gps" onclick="app.getLocation()"><i
                                class="fas fa-location-arrow"></i></button>
                    </div>
                </div>
                <div class="grid">
                    <div class="input-group">
                        <label>Chủ quán/Người mua *</label>
                        <input type="text" name="chu_quan" required placeholder="Tên khách hàng">
                    </div>
                    <div class="input-group">
                        <label>SĐT/Zalo *</label>
                        <input type="tel" name="sdt_zalo" required pattern="[0-9]{10}" placeholder="09xxxxxxxx"
                            oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10);">
                    </div>
                </div>
                <div class="actions">
                    <button type="button" class="btn-prev" onclick="app.nextStep(1)"><i class="fas fa-chevron-left"></i>
                        Quay lại</button>
                    <button type="button" class="btn-next" onclick="app.validateAndNext(2, 3)">Khảo sát <i
                            class="fas fa-chevron-right"></i></button>
                </div>
            </section>

            <section class="form-step" id="step3">
                <h3><i class="fas fa-eye"></i> Nhu Cầu & Khảo Sát</h3>

                <div class="grid">
                    <div class="input-group">
                        <label>Tiềm năng *</label>
                        <select name="tiem_nang" required>
                            <option value="">-- Đánh giá --</option>
                            <option value="1">⭐ Nhỏ</option>
                            <option value="2">⭐⭐ Ổn định</option>
                            <option value="3">⭐⭐⭐ Lớn</option>
                            <option value="4">⭐⭐⭐⭐ Rất lớn</option>
                            <option value="5">⭐⭐⭐⭐⭐ VIP</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Tình trạng mẫu *</label>
                        <select name="da_gui_mau" required>
                            <option value="">-- Chọn --</option>
                            <option value="Chưa gửi">Chưa gửi</option>
                            <option value="Đã gửi dùng thử">Đã gửi thử</option>
                            <option value="Đã test tại quán">Đã test tại quán</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label>Ngày ghé lại / Hẹn *</label>
                    <input type="date" name="ngay_goi_lai" id="ngay_goi_lai" required>
                </div>
                <div class="input-group">
                    <label>Ghi chú quan trọng</label>
                    <textarea name="phan_hoi" rows="3"
                        placeholder="Ghi chú thêm về khách, dặn dò giao hàng..."></textarea>
                </div>
                <div class="actions">
                    <button type="button" class="btn-prev" onclick="app.nextStep(2)"><i class="fas fa-chevron-left"></i>
                        Quay lại</button>
                    <button type="submit" class="btn-submit" id="submitBtn"><i class="fas fa-check-circle"></i> HOÀN TẤT
                        & LƯU</button>
                </div>
            </section>
        </form>
    </div>
    <script src="script.js"></script>
</body>

</html>
