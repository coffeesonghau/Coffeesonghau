<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSKH Coffee Sông Hậu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="intro-screen">
        <div class="intro-content">
            <img src="LogoSH.png" alt="Coffee Sông Hậu Logo" class="intro-logo">
            <h2 class="intro-text">COFFEE SÔNG HẬU</h2>
        </div>
    </div>

    <div class="card main-content hidden">
        <div class="logo">
            <img src="LogoSH.png" alt="Logo" class="card-logo-img">
        </div>

        <h1>COFFEE SÔNG HẬU</h1>
        <div class="subtitle">Chăm sóc khách hàngg</div>

        <div class="contact-list">
            <a href="tel:0852494694" class="contact-item">
                <div class="icon"><i class="fas fa-phone"></i></div>
                <div class="info">
                    <strong>Hotline</strong>
                    <span>0852 494 694</span>
                </div>
                <i class="fas fa-chevron-right arrow"></i>
            </a>

            <a href="https://zalo.me/0852494694" class="contact-item">
                <div class="icon"><i class="fas fa-comments"></i></div>
                <div class="info">
                    <strong>Zalo CSKH</strong>
                    <span>Nhắn tin trực tiếp</span>
                </div>
                <i class="fas fa-chevron-right arrow"></i>
            </a>

            <a href="https://facebook.com/coffeesonghau" target="_blank" class="contact-item">
                <div class="icon"><i class="fab fa-facebook-f"></i></div>
                <div class="info">
                    <strong>Facebook</strong>
                    <span>Coffee Sông Hậu</span>
                </div>
                <i class="fas fa-chevron-right arrow"></i>
            </a>

            <a href="https://www.coffeesonghau.com" target="_blank" class="contact-item">
                <div class="icon"><i class="fas fa-globe"></i></div>
                <div class="info">
                    <strong>Website</strong>
                    <span>coffeesonghau.com</span>
                </div>
                <i class="fas fa-chevron-right arrow"></i>
            </a>
        </div>

        <div class="status">
            <span class="dot"></span>
            Bộ phận CSKH đang tiếp nhận phản hồi
        </div>

        <div class="footer">
            © 2026 Coffee Sông Hậu
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
